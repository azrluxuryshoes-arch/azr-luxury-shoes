<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AZR Luxury Shoes</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Poppins;
background:#f5f5f5;
}

/* HEADER */

header{
background:black;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 80px;
}

.logo{
display:flex;
align-items:center;
font-size:28px;
font-family:Playfair Display;
letter-spacing:4px;
}

.logo img{
width:40px;
margin-right:10px;
}

nav a{
color:white;
margin-left:30px;
text-decoration:none;
}

/* HERO */

.hero{
height:90vh;

background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url("https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77");

background-size:cover;
background-position:center;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

color:white;
text-align:center;
}

.hero h1{
font-size:70px;
letter-spacing:6px;
}

.hero p{
margin-top:20px;
font-size:22px;
}

/* GALLERY */

.gallery{
padding:80px;
text-align:center;
}

.gallery h2{
font-size:40px;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
}

.grid img{
width:100%;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
transition:.4s;
}

.grid img:hover{
transform:scale(1.05);
}

/* BANNER */

.banner{
height:350px;

background:
linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),
url("https://images.unsplash.com/photo-1542291026-7eec264c27ff");

background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;

color:white;
font-size:42px;
font-family:Playfair Display;
}

/* FOOTER */

footer{
background:black;
color:white;
text-align:center;
padding:30px;
margin-top:40px;
}

/* WHATSAPP BUTTON */

.whatsapp {
  position: fixed;
  bottom: 25px;
  right: 25px;
  background: #25D366;
  color: white;
  padding: 15px 20px;
  border-radius: 50px;
  text-decoration: none;
  font-weight: 600;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  transition: transform 0.3s;
  z-index: 1000;
  display: flex;
  align-items: center;
  font-size: 16px;
}

.whatsapp img{
  width:25px;
  margin-right:10px;
}

.whatsapp:hover {
  transform: scale(1.1);
}

</style>

</head>

<body>

<header>

<div class="logo">
<img src="https://cdn-icons-png.flaticon.com/512/3063/3063825.png" alt="Logo">
AZR
</div>

<nav>
<a href="#">Home</a>
<a href="#">Collection</a>
<a href="#">Gallery</a>
<a href="#">Contact</a>
</nav>

</header>


<section class="hero">
<h1>AZR LUXURY SHOES</h1>
<p>Elegant Sneakers for Modern Fashion</p>
</section>


<section class="gallery">
<h2>Luxury Collection</h2>
<div class="grid">

<img src="https://images.unsplash.com/photo-1549298916-b41d501d3772">
<img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519">
<img src="https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a">
<img src="https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77">
<img src="https://images.unsplash.com/photo-1519741497674-611481863552">
<img src="https://images.unsplash.com/photo-1608231387042-66d1773070a5">

</div>
</section>


<section class="banner">
Premium Women's Sneakers
</section>


<footer>
<p>© 2026 AZR Luxury Shoes</p>
</footer>

<!-- WhatsApp Button -->
<a class="whatsapp" href="https://wa.me/963933235574" target="_blank">
  <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
  تواصل معنا الآن
</a>

</body>
</html>
